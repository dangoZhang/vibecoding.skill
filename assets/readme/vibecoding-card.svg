    <text x="164" y="722" fill="#F3F8FC" font-size="30" text-anchor="start" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-weight="500"><tspan x="164" dy="0">你已经不只是在提需求，而是在稳定推进一段真实工作。熟悉任务能沿着</tspan><tspan x="164" dy="42">上下文连续落地。这轮最能打的是上下文铺垫和执行推进：你背景和边界</tspan><tspan x="164" dy="42">给得够，AI侧会先动手再汇报。现在最该补的是迭代修正和补救适配：</tspan><tspan x="164" dy="42">你偏了以后补得还不够快，AI侧遇阻后的调整还不够快。</tspan></text>
